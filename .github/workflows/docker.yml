name: Build & Push Docker Image

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  SDK_VERSION: 1.9.17379

jobs:
  docker:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      # ── Discord Social SDK (cached) ────────────────────────────────────
      # DISCORD_SDK_URL is a signed Google Storage URL valid ~1hr.
      # Cache persists across runs — re-fetch only on version bump.
      - name: Cache Discord SDK
        id: cache-sdk
        uses: actions/cache@v4
        with:
          path: vendor/discord-sdk
          key: discord-sdk-${{ env.SDK_VERSION }}

      - name: Download SDK (cache miss)
        if: steps.cache-sdk.outputs.cache-hit != 'true'
        run: |
          set -e
          mkdir -p vendor/discord-sdk vendor/_tmp
          curl --retry 3 --retry-delay 5 -sL "${{ secrets.DISCORD_SDK_URL }}" -o sdk.zip
          unzip -q sdk.zip -d vendor/_tmp
          rm sdk.zip
          # Locate discordpp.h regardless of zip's top-level structure
          src=$(find vendor/_tmp -name discordpp.h -print -quit 2>/dev/null)
          if [ -z "$src" ]; then
            echo "discordpp.h not found in zip"
            exit 1
          fi
          # SDK root = grandparent of the file's directory
          #   src=.../DiscordSdk-x/include/discordpp.h → root=.../DiscordSdk-x
          #   src=.../include/discordpp.h              → root=...
          sdk_root=$(cd "$(dirname "$src")/.." && pwd -P)
          mv "$sdk_root"/* vendor/discord-sdk/
          mv "$sdk_root"/.* vendor/discord-sdk/ 2>/dev/null || true
          rm -rf vendor/_tmp
          test -f vendor/discord-sdk/include/discordpp.h

      - name: Place SDK where Docker expects it
        run: |
          mkdir -p lib
          rm -rf lib/discord_social_sdk
          cp -r vendor/discord-sdk lib/discord_social_sdk
          test -f lib/discord_social_sdk/include/discordpp.h

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}}
            type=ref,event=branch
            type=sha,prefix=

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
