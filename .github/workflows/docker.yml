name: Build & Push Docker Image

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  SDK_VERSION: 1.9.17379

jobs:
  docker:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      # ── Discord Social SDK (cached) ────────────────────────────────────
      # DISCORD_SDK_URL is a signed Google Storage URL valid ~1hr.
      # Cache persists across runs — re-fetch only on version bump.
      - name: Cache Discord SDK
        id: cache-sdk
        uses: actions/cache@v4
        with:
          path: vendor/discord-sdk
          key: discord-sdk-${{ env.SDK_VERSION }}

      - name: Download SDK (cache miss)
        if: steps.cache-sdk.outputs.cache-hit != 'true'
        run: |
          mkdir -p vendor/_sdk
          curl -sL "${{ secrets.DISCORD_SDK_URL }}" -o sdk.zip
          unzip -q sdk.zip -d vendor/_sdk
          rm sdk.zip
          # Zip may have a top-level dir (DiscordSocialSdk-1.9.17379/).
          # Flatten: move contents up so include/ is at the top.
          if [ -f vendor/_sdk/include/discordpp.h ]; then
            mv vendor/_sdk vendor/discord-sdk
          else
            sub="$(ls vendor/_sdk | head -1)"
            mv "vendor/_sdk/$sub" vendor/discord-sdk
            rmdir vendor/_sdk
          fi
          test -f vendor/discord-sdk/include/discordpp.h

      # Symlink cached SDK into lib/ so Docker's COPY lib/ finds it.
      # On cache miss the download step already populated vendor/discord-sdk.
      # On cache hit, actions/cache restored it.
      - name: Place SDK where Docker expects it
        run: |
          if [ -d vendor/discord-sdk/include ]; then
            ln -sfn vendor/discord-sdk lib/discord_social_sdk
          fi
          test -f lib/discord_social_sdk/include/discordpp.h

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}}
            type=ref,event=branch
            type=sha,prefix=

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
